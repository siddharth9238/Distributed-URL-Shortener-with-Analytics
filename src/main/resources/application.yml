spring:
  application:
    name: url-shortener
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
    show-sql: false
  datasource:
    url: jdbc:mysql://localhost:3306/url_shortener?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  security:
    jwt:
      secret: ${JWT_SECRET:your-very-secret-key-change-this-in-production-environment}
      expiration: 86400000

server:
  servlet:
    context-path: /
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024

app:
  jwt:
    secret: ${JWT_SECRET:your-very-secret-key-change-this-in-production-environment}
    expiration: 86400000
  cache:
    max-size: 10000
  rate-limiter:
    tokens-per-minute: 60
  scheduler:
    cleanup:
      enabled: true
      cron: "0 0 2 * * *"

logging:
  level:
    root: INFO
    com.siddharth.urlshortener: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
